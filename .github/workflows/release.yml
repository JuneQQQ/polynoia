name: release

# Build and publish the Polynoia desktop app (Tauri 2) for macOS / Windows / Linux.
#
# Why this exists: v0.1.0 shipped a macOS .app that opened to
# "asset not found: index.html" (issue #21). Root cause was a release-hygiene
# gap, not a code bug — `apps/web/dist` is gitignored, so the frontend's
# index.html only exists if `pnpm --filter @polynoia/web build` actually runs at
# package time. With hand-built releases and no CI, that step could silently be
# skipped (e.g. pnpm missing from a login shell), bundling an app with no
# frontend. This workflow makes packaging reproducible and FAILS LOUDLY if the
# frontend entrypoint is missing before the bundle is produced.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under (e.g. v0.1.2). Draft release."
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - os: macos-13 # Intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo (per target)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
          key: ${{ matrix.target }}

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend and verify the entrypoint exists (guards issue #21)
        run: |
          pnpm --filter @polynoia/web build
          node -e "if(!require('fs').existsSync('apps/web/dist/index.html')){console.error('FATAL: apps/web/dist/index.html is missing after the web build. Bundling now would ship a desktop app that opens to \"asset not found: index.html\" (regression of #21). Aborting.');process.exit(1)}console.log('OK: apps/web/dist/index.html present — frontend will embed into the bundle.')"

      - name: Build and publish desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          releaseName: "Polynoia ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
