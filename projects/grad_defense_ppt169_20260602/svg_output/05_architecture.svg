  </g>
  <g filter="url(#cardShadow)">
    <rect x="448" y="468" width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="608" y="496" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D3748">OpenCodeAdapter</text>
