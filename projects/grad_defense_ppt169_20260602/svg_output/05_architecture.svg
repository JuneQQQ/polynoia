  </g>
  <g filter="url(#cardShadow)">
    <rect x="782" y="468" width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="942" y="496" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D3748">CodexAdapter</text>
    <text x="942" y="520" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">codex exec --json</text>
  </g>
  <!-- Bottom: Stack -->
  <rect x="40" y="580" width="40" height="70" rx="8" fill="#718096"/>
  <text x="60" y="621" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#FFFFFF">S</text>
  <rect x="96" y="580" width="1144" height="70" rx="12" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="668" y="598" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="bold" fill="#718096">STACK · DATA &amp; INFRASTRUCTURE</text>
  <rect x="116" y="612" width="210" height="28" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="221" y="632" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#2D3748">Python 3.12 + FastAPI</text>
