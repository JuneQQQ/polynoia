    <text x="241" y="365" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">任务分解与分配</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="382" y="313" width="254" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="509" y="341" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D3748">Context Budget Engine</text>
    <text x="509" y="365" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">4-Layer Budget · Token Saving</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="650" y="313" width="254" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="777" y="341" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D3748">MCP Server</text>
    <text x="777" y="365" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">Role-based Tools · Security</text>
  </g>
  <g filter="url(#cardShadow)">
    <rect x="918" y="313" width="254" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="1045" y="341" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D3748">Sandbox</text>
    <text x="1045" y="365" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">Isolated Workspace · Git Merge</text>
  </g>
  <!-- Layer 1: Adapter Layer -->
  <rect x="40" y="425" width="40" height="130" rx="8" fill="#3182CE"/>
  <text x="60" y="498" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#FFFFFF">01</text>
  <rect x="96" y="425" width="1144" height="130" rx="12" fill="#EBF8FF" fill-opacity="0.6" stroke="#90CDF4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="668" y="448" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="bold" fill="#2B6CB0">适配器层 · ADAPTER LAYER (PAP Protocol)</text>
  <g filter="url(#cardShadow)">
    <rect x="114" y="468" width="320" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="274" y="496" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#2D3748">ClaudeCodeAdapter</text>
