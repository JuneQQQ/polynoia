  <text x="443" y="632" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#2D3748">React 18 + TypeScript + Vite</text>
  <rect x="560" y="612" width="210" height="28" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="665" y="632" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#2D3748">SQLite + Alembic</text>
  <rect x="782" y="612" width="210" height="28" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="887" y="632" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#2D3748">LiteLLM + Tool Whitelist</text>
  <rect x="1004" y="612" width="210" height="28" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="1109" y="632" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#2D3748">Git Sandbox + Subprocess</text>
  <text x="1200" y="700" font-family="Georgia, 'Microsoft YaHei', serif" font-size="11" fill="#718096" text-anchor="end">05</text>
</svg>
