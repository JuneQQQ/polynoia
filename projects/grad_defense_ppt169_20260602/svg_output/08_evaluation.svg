<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <filter id="barShadow" x="-5%" y="-15%" width="110%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComposite in="shadowColor" in2="offsetblur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#F7FAFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="#1A365D"/>
  <text x="80" y="60" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#1A365D">系统实现与实验评估</text>
  <text x="80" y="88" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">IMPLEMENTATION &amp; BENCHMARK EVALUATION</text>
  <line x1="80" y1="100" x2="1200" y2="100" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Chart area -->
  <rect x="80" y="120" width="1120" height="480" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="130" y="158" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#1A365D">任务完成效率对比 (Task Execution Efficiency)</text>
  <!-- Y-axis baseline -->
  <line x1="150" y1="190" x2="150" y2="540" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Y axis ticks -->
  <text x="140" y="195" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#718096">100</text>
  <line x1="150" y1="190" x2="1150" y2="190" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="140" y="277" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#718096">75</text>
  <line x1="150" y1="272" x2="1150" y2="272" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="140" y="359" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#718096">50</text>
  <line x1="150" y1="354" x2="1150" y2="354" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="140" y="441" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#718096">25</text>
  <line x1="150" y1="436" x2="1150" y2="436" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="140" y="523" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#718096">0</text>
  <line x1="150" y1="518" x2="1150" y2="518" stroke="#A0AEC0" stroke-width="1"/>
  <!-- X-axis labels -->
  <text x="312" y="552" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#4A5568">Bug Fixing</text>
  <text x="624" y="552" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#4A5568">Feature Dev</text>
  <text x="936" y="552" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#4A5568">Code Review</text>
  <!-- Bar group 1: Bug Fixing -->
  <g filter="url(#barShadow)">
    <rect x="220" y="232" width="65" height="286" rx="4" fill="#2B6CB0" fill-opacity="0.85"/>
  </g>
  <text x="252" y="224" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2B6CB0">78</text>
  <g filter="url(#barShadow)">
    <rect x="295" y="334" width="65" height="184" rx="4" fill="#63B3ED" fill-opacity="0.85"/>
  </g>
  <text x="327" y="326" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#63B3ED">50</text>
  <g filter="url(#barShadow)">
    <rect x="370" y="396" width="65" height="122" rx="4" fill="#E2E8F0" fill-opacity="0.85"/>
  </g>
  <text x="402" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#A0AEC0">33</text>
  <text x="312" y="315" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#718096">+56%</text>
  <!-- Bar group 2: Feature Dev -->
  <g filter="url(#barShadow)">
    <rect x="508" y="218" width="65" height="300" rx="4" fill="#2B6CB0" fill-opacity="0.85"/>
  </g>
  <text x="540" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2B6CB0">82</text>
  <g filter="url(#barShadow)">
    <rect x="583" y="312" width="65" height="206" rx="4" fill="#63B3ED" fill-opacity="0.85"/>
  </g>
  <text x="615" y="304" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#63B3ED">56</text>
  <g filter="url(#barShadow)">
    <rect x="658" y="396" width="65" height="122" rx="4" fill="#E2E8F0" fill-opacity="0.85"/>
  </g>
  <text x="690" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#A0AEC0">33</text>
  <text x="600" y="293" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#718096">+46%</text>
  <!-- Bar group 3: Code Review -->
  <g filter="url(#barShadow)">
    <rect x="796" y="298" width="65" height="220" rx="4" fill="#2B6CB0" fill-opacity="0.85"/>
  </g>
  <text x="828" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2B6CB0">60</text>
  <g filter="url(#barShadow)">
    <rect x="871" y="354" width="65" height="164" rx="4" fill="#63B3ED" fill-opacity="0.85"/>
  </g>
  <text x="903" y="346" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#63B3ED">45</text>
  <g filter="url(#barShadow)">
    <rect x="946" y="440" width="65" height="78" rx="4" fill="#E2E8F0" fill-opacity="0.85"/>
  </g>
  <text x="978" y="432" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#A0AEC0">21</text>
  <text x="888" y="335" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#718096">+33%</text>
  <!-- Legend -->
  <rect x="440" y="570" width="16" height="16" rx="3" fill="#2B6CB0" fill-opacity="0.85"/>
  <text x="462" y="583" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4A5568">Polynoia (3 Agents)</text>
  <rect x="630" y="570" width="16" height="16" rx="3" fill="#63B3ED" fill-opacity="0.85"/>
  <text x="652" y="583" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4A5568">Single Agent Baseline</text>
  <rect x="860" y="570" width="16" height="16" rx="3" fill="#E2E8F0" fill-opacity="0.85"/>
  <text x="882" y="583" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#4A5568">No-Tool Baseline</text>
  <!-- Metrics cards below chart -->
  <rect x="80" y="620" width="345" height="72" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="252" y="648" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#38A169">67%</text>
  <text x="252" y="676" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">冲突解决时间缩短</text>
  <rect x="467" y="620" width="345" height="72" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="639" y="648" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#2B6CB0">43%</text>
  <text x="639" y="676" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">Context Token 节省率</text>
  <rect x="854" y="620" width="345" height="72" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="1026" y="648" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#805AD5">3.2×</text>
  <text x="1026" y="676" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">并行加速比 (vs 串行)</text>
  <text x="1200" y="700" font-family="Georgia, 'Microsoft YaHei', serif" font-size="11" fill="#718096" text-anchor="end">08</text>
</svg>
