<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F7FAFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="#1A365D"/>
  <text x="80" y="60" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#1A365D">研究背景与问题定义</text>
  <line x1="80" y1="78" x2="1200" y2="78" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Left: Single-Agent Bottlenecks -->
  <text x="80" y="120" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#2B6CB0">单 Agent 瓶颈</text>
  <rect x="80" y="140" width="520" height="58" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="105" cy="170" r="10" fill="#E53E3E" fill-opacity="0.15"/>
  <text x="115" y="174" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">上下文窗口有限</text>
  <text x="328" y="174" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">单会话无法容纳完整项目上下文</text>
  <rect x="80" y="205" width="520" height="58" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="105" cy="235" r="10" fill="#E53E3E" fill-opacity="0.15"/>
  <text x="115" y="239" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">角色固化</text>
  <text x="208" y="239" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">难在"编码"与"审查"模式间有效切换</text>
  <rect x="80" y="270" width="520" height="58" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="105" cy="300" r="10" fill="#E53E3E" fill-opacity="0.15"/>
  <text x="115" y="304" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">并行度受限</text>
  <text x="227" y="304" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">串行执行无法利用多核 / 分布式计算</text>
  <!-- Right: Multi-Agent Challenges -->
  <text x="640" y="120" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#2B6CB0">多 Agent 协作挑战</text>
  <rect x="640" y="140" width="560" height="58" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="660" y="150" width="36" height="36" rx="8" fill="#2B6CB0" fill-opacity="0.1"/>
  <text x="714" y="174" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">任务拆解</text>
  <text x="820" y="174" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">如何将复杂任务分解为可并行子任务</text>
  <rect x="640" y="205" width="560" height="58" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="660" y="215" width="36" height="36" rx="8" fill="#2B6CB0" fill-opacity="0.1"/>
  <text x="714" y="239" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">文件冲突</text>
  <text x="820" y="239" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">多 Agent 同时写入时如何避免冲突</text>
  <rect x="640" y="270" width="560" height="58" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="660" y="280" width="36" height="36" rx="8" fill="#2B6CB0" fill-opacity="0.1"/>
  <text x="714" y="304" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#2D3748">上下文管理</text>
  <text x="857" y="304" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">多 Agent 的有限上下文窗口如何调度</text>
  <!-- Bottom summary -->
  <rect x="80" y="355" width="1120" height="180" rx="12" fill="#1A365D" fill-opacity="0.05" stroke="#E2E8F0" stroke-width="1"/>
  <text x="110" y="390" font-family="Georgia, 'Microsoft YaHei', serif" font-size="20" font-weight="bold" fill="#1A365D">核心问题：如何构建一个能统一接入多种 Agent CLI、有效管理上下文、</text>
  <text x="110" y="420" font-family="Georgia, 'Microsoft YaHei', serif" font-size="20" font-weight="bold" fill="#1A365D">确保并行编辑一致性的多 Agent 协作平台？</text>
  <text x="110" y="470" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#718096">研究目标：设计 Polynoia —— IM 形态的多 Agent 协作系统，实现三层协议架构 + 四层上下文预算 + 冲突闭环</text>
  <!-- Decorative element -->
  <rect x="640" y="113" width="4" height="200" fill="#2B6CB0" fill-opacity="0.15"/>
  <text x="1200" y="700" font-family="Georgia, 'Microsoft YaHei', serif" font-size="11" fill="#718096" text-anchor="end">03</text>
</svg>
