    <text x="690" y="205" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#2B6CB0">3</text>
    <text x="735" y="205" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">CLI Adapters</text>
