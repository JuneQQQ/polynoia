<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F7FAFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="#1A365D"/>
  <text x="80" y="60" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#1A365D">四层上下文预算引擎</text>
  <text x="80" y="88" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">4-LAYER CONTEXT BUDGET: SYSTEM · HISTORY · TOOL · SPILLOVER</text>
  <line x1="80" y1="100" x2="1200" y2="100" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Layer 1: System -->
  <rect x="80" y="120" width="1120" height="115" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="80" y="120" width="8" height="115" rx="12" fill="#2B6CB0"/>
  <text x="120" y="160" font-family="Georgia, 'Microsoft YaHei', serif" font-size="22" font-weight="bold" fill="#1A365D">01 系统层 · SYSTEM</text>
  <rect x="860" y="135" width="180" height="28" rx="6" fill="#EBF8FF"/>
  <text x="950" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2B6CB0">̃ 2.5K tokens</text>
  <text x="120" y="195" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#2D3748">项目 rules · Spec · ADR · CLAUDE.md · Agent identity + role prompt · Skill定义</text>
  <text x="120" y="218" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">静态预加载，伴随整个 session 生命周期</text>
  <!-- Layer 2: History -->
  <rect x="80" y="245" width="1120" height="115" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="80" y="245" width="8" height="115" rx="12" fill="#1A365D"/>
  <text x="120" y="285" font-family="Georgia, 'Microsoft YaHei', serif" font-size="22" font-weight="bold" fill="#1A365D">02 历史层 · HISTORY</text>
  <rect x="860" y="260" width="180" height="28" rx="6" fill="#EDF2F7"/>
  <text x="950" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1A365D">̃ 8K tokens</text>
  <text x="120" y="320" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#2D3748">最近 N 轮消息 · 滑动窗口截断 · 优先保留 error/correction cycles</text>
  <text x="120" y="343" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">超出窗口的消息压缩为 summary brief(由快模型生成)</text>
  <!-- Layer 3: Tool Results -->
  <rect x="80" y="370" width="1120" height="115" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="80" y="370" width="8" height="115" rx="12" fill="#3182CE"/>
  <text x="120" y="410" font-family="Georgia, 'Microsoft YaHei', serif" font-size="22" font-weight="bold" fill="#1A365D">03 工具层 · TOOL RESULTS</text>
  <rect x="860" y="385" width="180" height="28" rx="6" fill="#EBF8FF"/>
  <text x="950" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#2B6CB0">动态 Elastic</text>
  <text x="120" y="445" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#2D3748">工具调用结果 · 文件 diff · codebase 检索 · 动态衰减(越早的工具结果权重越低)</text>
  <text x="120" y="468" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">超过阈值的旧结果被 drop，仅保留最近 3 轮工具调用</text>
  <!-- Layer 4: Spillover -->
  <rect x="80" y="495" width="1120" height="115" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="80" y="495" width="8" height="115" rx="12" fill="#63B3ED"/>
  <text x="120" y="535" font-family="Georgia, 'Microsoft YaHei', serif" font-size="22" font-weight="bold" fill="#1A365D">04 扩散层 · SPILLOVER</text>
  <rect x="860" y="510" width="180" height="28" rx="6" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="950" y="530" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#718096">残留预算</text>
  <text x="120" y="570" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#2D3748">剩余 tokens → 自动分配至 task ID 粒度的 memory bank，跨 session 存档</text>
  <text x="120" y="593" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">下次相同 task 的对话可从 Spillover 恢复关键上下文</text>
  <text x="1200" y="700" font-family="Georgia, 'Microsoft YaHei', serif" font-size="11" fill="#718096" text-anchor="end">07</text>
</svg>
