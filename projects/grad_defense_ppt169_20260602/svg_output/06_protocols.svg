<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#F7FAFC"/>
  <rect x="0" y="0" width="1280" height="4" fill="#1A365D"/>
  <text x="80" y="60" font-family="Georgia, 'Microsoft YaHei', 'PingFang SC', serif" font-size="32" font-weight="bold" fill="#1A365D">三层协议设计</text>
  <text x="80" y="88" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#718096">PAP · ACP · AI SDK 6 — THREE PROTOCOL BRIDGES</text>
  <line x1="80" y1="100" x2="1200" y2="100" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Protocol 1: PAP -->
  <rect x="80" y="120" width="360" height="240" rx="12" fill="#FFFFFF" stroke="#90CDF4" stroke-width="1.5"/>
  <rect x="80" y="120" width="360" height="6" rx="12" fill="#2B6CB0"/>
  <rect x="110" y="142" width="52" height="52" rx="10" fill="#2B6CB0" fill-opacity="0.08"/>
  <text x="186" y="175" font-family="Georgia, 'Microsoft YaHei', serif" font-size="22" font-weight="bold" fill="#1A365D">PAP</text>
  <text x="110" y="210" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#2D3748">Protocol for Agent Pipeline</text>
  <text x="110" y="232" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">Adapter ↔ Server 层</text>
  <text x="110" y="255" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">NDJSON, stdin/stdout</text>
  <rect x="110" y="275" width="300" height="30" rx="6" fill="#EBF8FF"/>
  <text x="260" y="295" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="bold" fill="#2B6CB0">子进程 subprocess.Popen</text>
  <text x="110" y="335" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#A0AEC0">Adapter Protocol base class</text>
  <!-- Protocol 2: ACP -->
  <rect x="460" y="120" width="360" height="240" rx="12" fill="#FFFFFF" stroke="#A0AEC0" stroke-width="1.5"/>
  <rect x="460" y="120" width="360" height="6" rx="12" fill="#1A365D"/>
  <rect x="490" y="142" width="52" height="52" rx="10" fill="#1A365D" fill-opacity="0.08"/>
  <text x="566" y="175" font-family="Georgia, 'Microsoft YaHei', serif" font-size="22" font-weight="bold" fill="#1A365D">ACP v1</text>
  <text x="490" y="210" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#2D3748">Agent Client Protocol</text>
  <text x="490" y="232" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">OpenCode ↔ Adapter 层</text>
  <text x="490" y="255" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">JSON-RPC over NDJSON</text>
  <rect x="490" y="275" width="300" height="30" rx="6" fill="#EDF2F7"/>
  <text x="640" y="295" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A365D">Zed Industries 开放标准</text>
  <text x="490" y="335" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#A0AEC0">initialize / session/prompt</text>
  <!-- Protocol 3: AI SDK 6 -->
  <rect x="840" y="120" width="360" height="240" rx="12" fill="#FFFFFF" stroke="#63B3ED" stroke-width="1.5"/>
  <rect x="840" y="120" width="360" height="6" rx="12" fill="#3182CE"/>
  <rect x="870" y="142" width="52" height="52" rx="10" fill="#3182CE" fill-opacity="0.08"/>
  <text x="946" y="175" font-family="Georgia, 'Microsoft YaHei', serif" font-size="22" font-weight="bold" fill="#1A365D">AI SDK 6</text>
  <text x="870" y="210" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#2D3748">Vercel AI SDK Protocol</text>
  <text x="870" y="232" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">Server ↔ Client 层</text>
  <text x="870" y="255" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">28 Chunk Types · SSE/WS</text>
  <rect x="870" y="275" width="300" height="30" rx="6" fill="#EBF8FF"/>
  <text x="1020" y="295" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" font-weight="bold" fill="#2B6CB0">UIMessageChunk 双向流</text>
  <text x="870" y="335" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#A0AEC0">text-delta / tool-call / data-*</text>
  <!-- Flow diagram -->
  <rect x="80" y="390" width="1120" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="130" y="425" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#1A365D">协议转换流程</text>
  <!-- Flow nodes -->
  <rect x="100" y="455" width="170" height="55" rx="8" fill="#EBF8FF" stroke="#90CDF4" stroke-width="1"/>
  <text x="185" y="478" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Client Request</text>
  <text x="185" y="498" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">REST + WS Commands</text>
  <!-- Arrow 1 -->
  <line x1="270" y1="482" x2="310" y2="482" stroke="#2B6CB0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2B6CB0"/>
    </marker>
  </defs>
  <rect x="312" y="455" width="180" height="55" rx="8" fill="#EDF2F7" stroke="#A0AEC0" stroke-width="1"/>
  <text x="402" y="478" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Context Budget</text>
  <text x="402" y="498" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">4-Layer Assemble</text>
  <line x1="492" y1="482" x2="532" y2="482" stroke="#2B6CB0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="534" y="455" width="180" height="55" rx="8" fill="#F0FFF4" stroke="#A0AEC0" stroke-width="1"/>
  <text x="624" y="478" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Orchestrator</text>
  <text x="624" y="498" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">任务分配</text>
  <line x1="714" y1="482" x2="754" y2="482" stroke="#2B6CB0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="756" y="455" width="180" height="55" rx="8" fill="#EBF8FF" stroke="#90CDF4" stroke-width="1"/>
  <text x="846" y="478" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Adapter Pool</text>
  <text x="846" y="498" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">PAP NDJSON Stream</text>
  <line x1="936" y1="482" x2="976" y2="482" stroke="#2B6CB0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="978" y="455" width="190" height="55" rx="8" fill="#1A365D" fill-opacity="0.06" stroke="#A0AEC0" stroke-width="1"/>
  <text x="1073" y="478" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">SSE/WS Push</text>
  <text x="1073" y="498" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="12" fill="#718096">AI SDK 6 Chunks</text>
  <!-- Bottom details -->
  <rect x="100" y="535" width="1068" height="116" rx="8" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="130" y="558" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A365D">关键设计决策</text>
  <text x="130" y="582" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">1. OpenCode Adapter 走 ACP v1 协议 (而非临时 --format json) —— ACP 是 Zed Industries 开放标准，协议层结构化</text>
  <text x="130" y="605" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">2. Codex Adapter backend 由用户自配 ~/.codex/config.toml —— 不假设 backend (OpenAI / LiteLLM / Bedrock)</text>
  <text x="130" y="628" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#718096">3. 前端用 AI SDK 6 作协议层 (非 assistant-ui) —— 支持多 Agent 消息流 + 28 种 chunk 类型</text>
  <text x="1200" y="700" font-family="Georgia, 'Microsoft YaHei', serif" font-size="11" fill="#718096" text-anchor="end">06</text>
</svg>
