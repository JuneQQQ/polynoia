<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- maximum-scale=1 + user-scalable=no: stop iOS WebView from auto-zooming
         when a <16px input is focused (modals like NewContactModal use 13px
         fields); without it the zoom sticks after the field unmounts on cancel,
         leaving the whole UI enlarged. Desktop browsers ignore these. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Polynoia · 多 Agent 协作平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Chinese Editorial typography:
         · Noto Serif SC (display) — 标题层,衬线宋体,中文优先
         · IBM Plex Sans SC (body) — 正文,中英混排清晰
         · JetBrains Mono (code) — 等宽代码
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Restore the user's chosen theme before paint (no FOUC). Default: light (warm cream / 暖奶油). -->
    <script>
      try {
        var t = localStorage.getItem("polynoia-theme");
        // Any known preset; fall back to the html default (light / 暖奶油).
        var ok = ["dark","light","ink-blue","sage-paper","slate-copper","mist-stone"];
        if (t && ok.indexOf(t) !== -1) document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
